name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, cancelling older in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Default (no vars set) is the ESPN data source — key-less + CORS, so the
          # deployed site needs NO secrets or proxy. These optional repo Variables
          # (Settings → Secrets and variables → Actions) only matter if you switch
          # to football-data.org: set VITE_DATA_SOURCE=api and point
          # VITE_FOOTBALL_DATA_BASE at your proxy Worker (see proxy/).
          VITE_DATA_SOURCE: ${{ vars.VITE_DATA_SOURCE }}
          VITE_FOOTBALL_DATA_BASE: ${{ vars.VITE_FOOTBALL_DATA_BASE }}

      - name: SPA fallback for client-side routing
        run: cp dist/index.html dist/404.html

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
